<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHABHARATA: DHARMA WARS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/characters.css">
    <link rel="stylesheet" href="css/game.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
    <!-- TITLE SCREEN -->
    <div id="titleScreen" class="screen active">
        <div class="title-container">
            <div class="divine-aura"></div>
            <h1 class="main-title">MAHABHARATA</h1>
            <p class="subtitle">DHARMA WARS</p>
            <div class="cinematic-text">
                <p>"In the great battle of Dharma versus Adharma, five brothers shall rise..."</p>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="startNewGame()">NEW GAME</button>
                <button class="btn btn-secondary" onclick="showScreen('loadScreen')">CONTINUE</button>
                <button class="btn btn-secondary" onclick="showScreen('settingsScreen')">SETTINGS</button>
            </div>
        </div>
    </div>

    <!-- CHARACTER SELECTION SCREEN -->
    <div id="characterScreen" class="screen">
        <div class="character-selection">
            <h2>Choose Your Hero</h2>
            <div class="characters-grid">
                <!-- Characters will be populated by JavaScript -->
            </div>
            <div id="characterInfo" class="character-info"></div>
            <button class="btn btn-primary" onclick="confirmCharacterSelection()">SELECT HERO</button>
        </div>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div class="game-container">
            <!-- Game Canvas -->
            <div id="gameCanvas" class="game-canvas"></div>
            
            <!-- HUD -->
            <div class="hud">
                <!-- Character Status -->
                <div class="character-panel">
                    <div class="character-portrait" id="charPortrait"></div>
                    <div class="status-bars">
                        <div class="health-bar">
                            <div class="health-fill" id="healthBar"></div>
                            <span id="healthText">100/100</span>
                        </div>
                        <div class="mana-bar">
                            <div class="mana-fill" id="manaBar"></div>
                            <span id="manaText">100/100</span>
                        </div>
                        <div class="ultimate-bar">
                            <div class="ultimate-fill" id="ultimateBar"></div>
                            <span id="ultimateText">Ultimate: 0%</span>
                        </div>
                    </div>
                </div>

                <!-- Combat Controls -->
                <div class="combat-controls">
                    <button class="control-btn" id="attackBtn">ATTACK (LMB)</button>
                    <button class="control-btn" id="skillBtn">SKILL (E)</button>
                    <button class="control-btn" id="dodgeBtn">DODGE (SPACE)</button>
                    <button class="control-btn ultimate" id="ultimateBtn">ULTIMATE (Q)</button>
                </div>

                <!-- Mini Map -->
                <div class="mini-map">
                    <canvas id="miniMapCanvas"></canvas>
                </div>

                <!-- Dialogue/Story Box -->
                <div class="dialogue-box" id="dialogueBox" style="display:none;">
                    <div class="dialogue-speaker" id="dialogueSpeaker"></div>
                    <div class="dialogue-text" id="dialogueText"></div>
                    <div class="dialogue-choices" id="dialogueChoices"></div>
                </div>
            </div>

            <!-- Mission Info -->
            <div class="mission-info" id="missionInfo">
                <h3 id="missionTitle">Mission</h3>
                <p id="missionObjective">Objective</p>
            </div>
        </div>
    </div>

    <!-- STORY/CUTSCENE SCREEN -->
    <div id="storyScreen" class="screen">
        <div class="cutscene-container">
            <video id="cutsceneVideo" class="cutscene-video"></video>
            <div class="story-narrative">
                <div class="narrator-text" id="narratorText"></div>
            </div>
            <div class="story-skip">
                <button onclick="skipStory()">SKIP (SPACE)</button>
            </div>
        </div>
    </div>

    <!-- PAUSE MENU -->
    <div id="pauseMenu" class="overlay" style="display:none;">
        <div class="pause-panel">
            <h2>PAUSED</h2>
            <div class="pause-options">
                <button class="btn btn-primary" onclick="resumeGame()">RESUME</button>
                <button class="btn btn-secondary" onclick="showScreen('skillsScreen')">SKILLS & UPGRADES</button>
                <button class="btn btn-secondary" onclick="showScreen('inventoryScreen')">INVENTORY</button>
                <button class="btn btn-secondary" onclick="showScreen('journalScreen')">JOURNAL</button>
                <button class="btn btn-danger" onclick="showScreen('titleScreen')">MAIN MENU</button>
            </div>
        </div>
    </div>

    <!-- SKILLS SCREEN -->
    <div id="skillsScreen" class="screen">
        <div class="skills-container">
            <h2>Skills & Abilities</h2>
            <div class="skills-tree">
                <!-- Skill trees will be populated dynamically -->
            </div>
        </div>
    </div>

    <!-- INVENTORY SCREEN -->
    <div id="inventoryScreen" class="screen">
        <div class="inventory-container">
            <h2>Inventory</h2>
            <div class="inventory-grid">
                <!-- Items will be populated dynamically -->
            </div>
        </div>
    </div>

    <!-- JOURNAL SCREEN -->
    <div id="journalScreen" class="screen">
        <div class="journal-container">
            <h2>Quest Journal</h2>
            <div class="quests-list">
                <!-- Quests will be populated dynamically -->
            </div>
        </div>
    </div>

    <!-- SETTINGS SCREEN -->
    <div id="settingsScreen" class="screen">
        <div class="settings-container">
            <h2>SETTINGS</h2>
            <div class="settings-options">
                <div class="setting">
                    <label>Master Volume</label>
                    <input type="range" min="0" max="100" value="80" id="volumeSlider">
                </div>
                <div class="setting">
                    <label>Graphics Quality</label>
                    <select id="graphicsSelect">
                        <option>Low</option>
                        <option selected>Medium</option>
                        <option>High</option>
                        <option>Ultra</option>
                    </select>
                </div>
                <div class="setting">
                    <label>
                        <input type="checkbox" id="subtitlesToggle" checked>
                        Enable Subtitles
                    </label>
                </div>
            </div>
            <button class="btn btn-primary" onclick="showScreen('titleScreen')">BACK</button>
        </div>
    </div>

    <!-- ADMIN LOGIN (HIDDEN) -->
    <div id="adminLogin" class="screen admin-screen" style="display:none;">
        <div class="admin-login-panel">
            <h2>🔐 DIVINE REALM ACCESS</h2>
            <input type="password" id="adminPassword" placeholder="Enter divine code..." />
            <button class="btn btn-primary" onclick="verifyAdminAccess()">UNLOCK KRISHNA</button>
            <button class="btn btn-secondary" onclick="showScreen('titleScreen')">BACK</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/game.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/combat.js"></script>
    <script src="js/story.js"></script>
    <script src="js/admin.js"></script>
</body>
  </html>
